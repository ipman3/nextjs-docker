name: Coolify Redeploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: coolify-redeploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  redeploy:
    needs: verify
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          test -n "$COOLIFY_TOKEN" || (echo "Missing COOLIFY_TOKEN secret" && exit 1)
          test -n "$COOLIFY_WEBHOOK" || (echo "Missing COOLIFY_WEBHOOK secret" && exit 1)
          curl --fail --show-error --silent \
            --location \
            --request GET "$COOLIFY_WEBHOOK" \
            --header "Authorization: Bearer $COOLIFY_TOKEN"
